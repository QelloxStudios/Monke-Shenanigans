<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mod Application | Monke Shenanigans</title>
<link rel="icon" type="image/x-icon" href="qellox.ico">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
body {
  margin: 0;
  font-family: 'Poppins', Arial, Helvetica, sans-serif;
  background: #1a1a1a;
  color: white;
}

header {
  background: #d97634;
  padding: 40px 20px;
  text-align: center;
}

h1 {
  margin: 0;
  font-size: 40px;
  font-weight: 700;
  letter-spacing: 2px;
}

.subtitle {
  font-size: 15px;
  opacity: .85;
  margin-top: 8px;
}

section {
  padding: 60px 20px;
  max-width: 700px;
  margin: auto;
}

.card {
  background: #262626;
  padding: 30px;
  border-radius: 12px;
}

label {
  display: block;
  margin-top: 20px;
  margin-bottom: 6px;
  font-weight: 600;
  font-size: 14px;
  opacity: .9;
}

input, textarea {
  width: 100%;
  background: #1a1a1a;
  border: 1px solid #444;
  border-radius: 8px;
  padding: 12px;
  color: white;
  font-family: 'Poppins', sans-serif;
  font-size: 14px;
  box-sizing: border-box;
  transition: border .2s;
}

input:focus, textarea:focus {
  outline: none;
  border-color: #d97634;
}

textarea {
  resize: vertical;
  min-height: 100px;
}

.btn {
  display: inline-block;
  margin-top: 24px;
  padding: 14px 32px;
  background: #d97634;
  color: white;
  border: none;
  border-radius: 10px;
  font-weight: bold;
  font-size: 15px;
  cursor: pointer;
  transition: .2s;
  width: 100%;
}

.btn:hover {
  background: #c4652a;
  transform: scale(1.02);
}

.btn:disabled {
  opacity: .6;
  cursor: not-allowed;
  transform: none;
}

.success {
  display: none;
  background: #1e3a1e;
  border: 1px solid #4caf50;
  border-radius: 10px;
  padding: 16px;
  margin-top: 20px;
  text-align: center;
  color: #4caf50;
  font-weight: 600;
}

.error {
  display: none;
  background: #3a1e1e;
  border: 1px solid #f44336;
  border-radius: 10px;
  padding: 16px;
  margin-top: 20px;
  text-align: center;
  color: #f44336;
  font-weight: 600;
}

footer {
  text-align: center;
  padding: 30px;
  opacity: .5;
  font-size: 14px;
}

a.back {
  display: inline-block;
  margin-bottom: 20px;
  color: #d97634;
  text-decoration: none;
  font-size: 14px;
}

a.back:hover {
  text-decoration: underline;
}
</style>
</head>
<body>

<header>
  <h1>🐵 Mod Application</h1>
  <p class="subtitle">Monke Shenanigans — QelloxStudios</p>
</header>

<section>
  <a class="back" href="index.html">← Back to main site</a>
  <div class="card">
    <p style="opacity:.7; margin-top:0;">hey! we're looking for moderators for Monke Shenanigans. fill this out if you're interested 🐵</p>

    <label>What's your username?</label>
    <input type="text" id="username" placeholder="Your in-game or Discord username" />

    <label>Why do you want to be a moderator?</label>
    <textarea id="why" placeholder="Tell us why..."></textarea>

    <label>How would you handle a toxic player?</label>
    <textarea id="toxic" placeholder="What would you do?"></textarea>

    <label>How would you handle a racist player?</label>
    <textarea id="racist" placeholder="What would you do?"></textarea>

    <label>Have you been a moderator in any games or communities?</label>
    <textarea id="experience" placeholder="If yes, where? If no, that's okay too!"></textarea>

    <label>Anything else you want to add?</label>
    <textarea id="extra" placeholder="Optional..."></textarea>

    <button class="btn" id="submitBtn" onclick="submitApp()">Submit Application</button>

    <div class="success" id="success">✅ Application submitted! We'll be in touch 🦍</div>
    <div class="error" id="error">❌ Something went wrong, please try again.</div>
  </div>
</section>

<footer>
  🐵 Monke Shenanigans © 2026 — QelloxStudios
</footer>

<script>
async function submitApp() {
  const username = document.getElementById('username').value.trim();
  const why = document.getElementById('why').value.trim();
  const toxic = document.getElementById('toxic').value.trim();
  const racist = document.getElementById('racist').value.trim();
  const experience = document.getElementById('experience').value.trim();
  const extra = document.getElementById('extra').value.trim();

  if (!username || !why || !toxic || !racist || !experience) {
    alert('Please fill out all required fields!');
    return;
  }

  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.textContent = 'Submitting...';

  const embed = {
    embeds: [{
      title: '🐵 New Mod Application!',
      color: 0xd97634,
      fields: [
        { name: '👤 Username', value: username },
        { name: '❓ Why do you want to be a mod?', value: why },
        { name: '😤 How would you handle a toxic player?', value: toxic },
        { name: '🚫 How would you handle a racist player?', value: racist },
        { name: '🛡️ Previous moderation experience?', value: experience },
        { name: '📝 Anything else?', value: extra || 'Nothing added.' }
      ],
      footer: { text: 'Monke Shenanigans Mod Application' },
      timestamp: new Date().toISOString()
    }]
  };

  try {
    const res = await fetch('https://discord.com/api/webhooks/1509284301009715210/fe1OtgiOpQi95uA34HEBJnFkjxyVjnbgXaukx1LdRmP86loCW5CJlsvSppdEpFbFA3Yg', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(embed)
    });

    if (res.ok) {
      document.getElementById('success').style.display = 'block';
      document.getElementById('error').style.display = 'none';
      btn.textContent = 'Submitted!';
    } else {
      throw new Error('Failed');
    }
  } catch (e) {
    document.getElementById('error').style.display = 'block';
    document.getElementById('success').style.display = 'none';
    btn.disabled = false;
    btn.textContent = 'Submit Application';
  }
}
</script>

</body>
</html>
