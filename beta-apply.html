<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Beta Tester Application | Monke Shenanigans</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
* {
    box-sizing: border-box;
}

body {
    margin: 0;
    background: #1a1a1a;
    color: white;
    font-family: 'Poppins', sans-serif;
}

header {
    background: #d97634;
    padding: 35px;
    text-align: center;
}

h1 {
    margin: 0;
    font-size: 40px;
}

.subtitle {
    opacity: 0.8;
    margin-top: 10px;
}

.container {
    max-width: 800px;
    margin: auto;
    padding: 30px;
}

.card {
    background: #262626;
    padding: 25px;
    border-radius: 14px;
}

label {
    display: block;
    margin-top: 15px;
    margin-bottom: 6px;
    font-weight: 600;
}

input, textarea, select {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 8px;
    background: #1f1f1f;
    color: white;
    font-size: 15px;
}

textarea {
    min-height: 110px;
    resize: vertical;
}

button {
    margin-top: 20px;
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 10px;
    background: #d97634;
    color: white;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
}

button:hover {
    background: #c4652a;
}

.success {
    display: none;
    margin-top: 15px;
    color: lightgreen;
    font-weight: 600;
}

.fake-buttons {
    margin-top: 10px;
    font-size: 14px;
    opacity: 0.85;
    line-height: 1.5;
    background: #1f1f1f;
    padding: 10px;
    border-radius: 8px;
}
</style>
</head>

<body>

<header>
<h1>🧪 Beta Tester Application</h1>
<p class="subtitle">Monke Shenanigans Application Form</p>
</header>

<div class="container">
<div class="card">

<form id="applicationForm">

<label>Discord Username</label>
<input id="discord" required>

<label>Age</label>
<input id="age" type="number" required>

<label>VR Headset</label>
<select id="headset">
<option>Quest 2</option>
<option>Quest 3</option>
<option>PCVR</option>
<option>Other</option>
</select>

<label>Experience</label>
<textarea id="experience" required></textarea>

<label>Activity Level</label>
<select id="activity">
<option>Very Active</option>
<option>Active</option>
<option>Casual</option>
<option>Rarely Active</option>
</select>

<label>Why do you want to join?</label>
<textarea id="reason" required></textarea>

<label>Bug finding ability</label>
<textarea id="bugs" required></textarea>

<label>Recording ability</label>
<select id="recording">
<option>Yes</option>
<option>No</option>
<option>Sometimes</option>
</select>

<!-- FAKE BUTTON UI -->
<div class="fake-buttons">
🟩 ACCEPT APPLICATION<br>
🟥 REJECT APPLICATION<br>
👉 (Staff review in Discord)
</div>

<button type="submit">🚀 Submit Application</button>

<div class="success" id="successMessage">
✅ Application submitted successfully!
</div>

</form>

</div>
</div>

<footer style="text-align:center;opacity:0.6;padding:20px;">
🐵 Monke Shenanigans © 2026
</footer>

<script>
const webhookURL = "https://discord.com/api/webhooks/1509610751831052503/-MUKhlrSyZcTyr6dhfET0lEtMRcyhnA6RxfzRRVYKqx0hi4rfz2MH66xT-MUjI5EwjSU";

let sending = false;

document.getElementById("applicationForm").addEventListener("submit", async (e) => {
    e.preventDefault();

    if (sending) return;
    sending = true;

    const embed = {
        title: "🧪 New Beta Tester Application!",
        color: 0xd97634,
        fields: [
            { name: "👤 Discord", value: document.getElementById("discord").value || "N/A" },
            { name: "🎂 Age", value: document.getElementById("age").value || "N/A", inline: true },
            { name: "🥽 Headset", value: document.getElementById("headset").value || "N/A", inline: true },
            { name: "🎮 Experience", value: document.getElementById("experience").value || "N/A" },
            { name: "⏰ Activity", value: document.getElementById("activity").value || "N/A", inline: true },
            { name: "🐵 Reason", value: document.getElementById("reason").value || "N/A" },
            { name: "🐛 Bugs", value: document.getElementById("bugs").value || "N/A" },
            { name: "📱 Recording", value: document.getElementById("recording").value || "N/A", inline: true }
        ],
        description: "🟩 ACCEPT | 🟥 REJECT (React or review in Discord)",
        timestamp: new Date().toISOString()
    };

    try {
        await fetch(webhookURL, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ embeds: [embed] })
        });

        document.getElementById("successMessage").style.display = "block";
        document.getElementById("applicationForm").reset();

    } catch (err) {
        alert("Failed to submit application.");
    }

    sending = false;
});
</script>

</body>
</html>
